name: Fork Release

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  build:
    if: github.repository != 'boldsoftware/shelley'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Build UI
        run: cd ui && pnpm install --frozen-lockfile && pnpm run build

      - name: Build templates
        run: |
          for dir in templates/*/; do
            name=$(basename "$dir")
            tar -czf "templates/$name.tar.gz" -C "templates/$name" --exclude='.DS_Store' .
          done

      - name: Generate version string
        id: version
        run: |
          VERSION="dev-$(git rev-list --count HEAD)-$(git rev-parse --short=6 HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and archive binaries
        run: |
          LDFLAGS="-s -w -X shelley.exe.dev/version.Version=${{ steps.version.outputs.version }}"

          for COMBO in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            OS="${COMBO%/*}"
            ARCH="${COMBO#*/}"
            CGO_ENABLED=0 GOOS="$OS" GOARCH="$ARCH" go build -ldflags "$LDFLAGS" -o shelley ./cmd/shelley
            tar -czf "shelley_${OS}_${ARCH}.tar.gz" shelley
            rm shelley
          done

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: archives
          path: shelley_*.tar.gz

    outputs:
      version: ${{ steps.version.outputs.version }}

  macos-app:
    needs: build
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: archives

      - name: Build DMG and app zip
        run: |
          tar -xzf "shelley_darwin_${{ matrix.arch }}.tar.gz"
          chmod +x scripts/build-macos-dmg.sh
          ./scripts/build-macos-dmg.sh "${{ matrix.arch }}" \
            shelley \
            "${{ needs.build.outputs.version }}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: Shelley_darwin_${{ matrix.arch }}.*

  release:
    needs: [build, macos-app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: archives

      - uses: actions/download-artifact@v4
        with:
          name: macos-amd64

      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          prerelease: true
          files: |
            shelley_linux_amd64.tar.gz
            shelley_linux_arm64.tar.gz
            shelley_darwin_amd64.tar.gz
            shelley_darwin_arm64.tar.gz
            Shelley_darwin_amd64.app.zip
            Shelley_darwin_arm64.app.zip
            Shelley_darwin_amd64.dmg
            Shelley_darwin_arm64.dmg
          body: |
            Dev build from commit ${{ github.sha }}
            
            **Downloads:**
            | Platform | Binary | App |
            |----------|--------|-----|
            | Linux amd64 | `shelley_linux_amd64.tar.gz` | |
            | Linux arm64 | `shelley_linux_arm64.tar.gz` | |
            | macOS Intel | `shelley_darwin_amd64.tar.gz` | [DMG](Shelley_darwin_amd64.dmg) · [App](Shelley_darwin_amd64.app.zip) |
            | macOS Apple Silicon | `shelley_darwin_arm64.tar.gz` | [DMG](Shelley_darwin_arm64.dmg) · [App](Shelley_darwin_arm64.app.zip) |
