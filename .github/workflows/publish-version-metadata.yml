name: Publish Version Metadata

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to publish metadata for'
        required: false
        default: 'main'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch || github.event.workflow_run.head_branch || 'main' }}

      - name: Determine branch
        id: branch
        run: |
          BRANCH="${{ github.event.inputs.branch || github.event.workflow_run.head_branch || 'main' }}"
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "Building metadata for branch: ${BRANCH}"

      - name: Download existing pages artifact
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: github-pages
          path: _existing

      - name: Extract existing site
        continue-on-error: true
        run: |
          if [ -f _existing/artifact.tar ]; then
            mkdir -p _site
            tar -xf _existing/artifact.tar -C _site || true
          fi

      - name: Generate version metadata
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          if [ "$BRANCH" = "main" ]; then
            python3 scripts/generate-version-metadata.py _site
          else
            python3 scripts/generate-version-metadata.py "_site/${BRANCH}"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
